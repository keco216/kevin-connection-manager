# Reverse Proxy vor der Guacamole-Webapp (Port 80).
# Bewusst als eigene Schicht behalten: kurzer Einstieg ohne /guacamole/-Pfadwissen,
# später TLS-Terminierung und X-Forwarded-For-Auswertung (Brute-Force-Sperre
# pro Client statt pro Proxy-IP).

server {
    listen 80;
    server_name _;

    # Einstieg: alles außerhalb von /guacamole/ auf die gebrandete UI umleiten
    location / {
        return 302 /guacamole/;
    }

    # Original-Guacamole-Webapp: REST-API unter /guacamole/api/…
    # und WebSocket-Tunnel unter /guacamole/websocket-tunnel
    location /guacamole/ {
        proxy_pass http://guacamole:8080/guacamole/;
        proxy_http_version 1.1;

        # WebSocket-Upgrade (Sitzungs-Tunnel)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Lange Sitzungen nicht abbrechen, Streams nicht puffern
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Datei-Uploads in Sitzungen (SFTP/Laufwerks-Redirect)
        client_max_body_size 1g;
    }
}
