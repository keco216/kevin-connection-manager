# Kevin Connection Manager – Server-Stack für Portainer (hinter Nginx Proxy Manager).
# Übernimmt das bewährte Layout des bisherigen Guacamole-Stacks 1:1: Init-Container
# erzeugt das DB-Schema, PostgreSQL 15, guacd mit Laufwerks-/Aufzeichnungs-Volumes,
# Guacamole auf Port 7070 (der NPM zeigt bereits dorthin und terminiert TLS).
#
# Das Guacamole-Image kommt von GHCR und enthält die Kevin-Branding-Extension
# bereits; es läuft auf dem wandernden Tag "latest" und wird vom mitgelieferten
# Watchtower-Service (Label-gescoped, nur dieser eine Container) jede Nacht um
# 04:00 automatisch aktualisiert.
#
# Vor dem Deploy in Portainer die Stack-Umgebungsvariable POSTGRES_PASSWORD setzen!
services:
  guacinit:
    image: guacamole/guacamole:1.6.0
    container_name: guac_init
    user: "0:0"
    command: sh -c "/opt/guacamole/bin/initdb.sh --postgresql > /init/initdb.sql"
    volumes:
      - guac_init:/init
    restart: "no"

  guacdb:
    image: postgres:15.2-alpine
    container_name: guacamole_db
    environment:
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD als Stack-Umgebungsvariable in Portainer setzen}
      POSTGRES_DB: guacamole_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - guac_db:/var/lib/postgresql/data
      # Schema-Skript aus dem Init-Container; läuft nur beim allerersten Start
      - guac_init:/docker-entrypoint-initdb.d:ro
    depends_on:
      guacinit:
        condition: service_completed_successfully
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    volumes:
      - guac_drive:/drive
      - guac_record:/record
    restart: unless-stopped

  guacamole:
    # Offizielles guacamole/guacamole:1.6.0 plus Kevin-Branding-Extension
    # (gebaut von .github/workflows/build-image.yml aus diesem Repo).
    # "latest" wandert mit jedem Extension-Update; Watchtower (unten) zieht
    # es nachts automatisch nach. Rollback: auf ein festes vX.Y.Z-Tag pinnen
    # (siehe GitHub-Releases).
    image: ghcr.io/keco216/kcm-guacamole:latest
    container_name: guacamole
    depends_on:
      - guacd
      - guacdb
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: guacdb
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: guacamole_user
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD als Stack-Umgebungsvariable in Portainer setzen}
      # Vorbereitung für Session-Recording (M8)
      RECORDING_SEARCH_PATH: /record
    volumes:
      - guac_record:/record
    ports:
      # NPM ist auf diesen Port eingestellt – nicht ändern
      - "7070:8080"
    restart: unless-stopped
    labels:
      # Einziger Container, den Watchtower aktualisieren darf
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    # Aktualisiert AUSSCHLIESSLICH Container mit dem enable-Label (oben nur
    # guacamole – guacd/Postgres und fremde Stacks wie Passbolt/RustDesk
    # bleiben unberührt). Update-Fenster: täglich 04:00 – Watchtower ersetzt
    # den Container, laufende Sitzungen würden sonst tagsüber abbrechen.
    # Läuft auf dem Host bereits ein eigener Watchtower, diesen Service
    # weglassen und dort --label-enable verwenden.
    image: containrrr/watchtower:1.7.1
    container_name: guacamole_watchtower
    command: --label-enable --cleanup --schedule "0 0 4 * * *"
    environment:
      TZ: Europe/Berlin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  guac_db:
  guac_init:
  guac_drive:
  guac_record:
