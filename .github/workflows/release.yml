# Release-Workflow: läuft bei Versions-Tags (v*). Er baut das Guacamole-Image
# NICHT neu, sondern hängt den Versions-Tag an das vorhandene Image – ein
# zweiter Build erzeugt sonst einen zweiten Digest mit identischem Inhalt, und
# die Paketseite zeigt zwei Einträge für denselben Stand. So trägt EIN Image
# die Tags latest, 1.6.0 und vX.Y.Z; der Versions-Tag bleibt der Rollback-Punkt.
#
# Dazu baut er den Windows-Desktop-Client und hängt MSI und Branding-Extension
# als Release-Assets an.
#
# Reihenfolge beim Veröffentlichen: erst nach main pushen und
# "Guacamole-Image mit Branding" abwarten (falls die Extension sich geändert
# hat), dann den Tag setzen – sonst zeigt der Versions-Tag auf den vorherigen
# Stand von latest.
name: Release

on:
  push:
    tags:
      - "v*"
  # Zum Nachziehen, wenn ein Tag schon steht (etwa nach einer Korrektur hier).
  workflow_dispatch:
    inputs:
      tag:
        description: "Versions-Tag, z. B. v1.1.0"
        required: true

permissions:
  contents: write
  packages: write

env:
  # Bei workflow_dispatch ist github.ref_name der Branch, nicht der Tag.
  TAG: ${{ inputs.tag || github.ref_name }}
  IMAGE: ghcr.io/keco216/kcm-guacamole

jobs:
  image:
    name: Versions-Tag an das vorhandene Image hängen
    runs-on: ubuntu-latest
    steps:
      # crane setzt den Tag auf den VORHANDENEN Digest. Wichtig: `docker buildx
      # imagetools create` taugt hier nicht – es legt eine neue Manifest-Liste
      # an, die einen eigenen Digest bekommt, und die Paketseite zeigt dann
      # erneut einen zweiten Eintrag für denselben Inhalt.
      - uses: imjasonh/setup-crane@v0.4

      - name: Anmelden
        run: crane auth login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Tag setzen und gegenprüfen
        run: |
          if ! crane manifest "$IMAGE:latest" >/dev/null 2>&1; then
            echo "::error::$IMAGE:latest existiert nicht – zuerst build-image.yml laufen lassen."
            exit 1
          fi

          crane tag "$IMAGE:latest" "$TAG"

          QUELLE=$(crane digest "$IMAGE:latest")
          ZIEL=$(crane digest "$IMAGE:$TAG")
          echo "latest: $QUELLE"
          echo "$TAG: $ZIEL"
          if [ "$QUELLE" != "$ZIEL" ]; then
            echo "::error::Digests weichen ab – der Tag hängt an einem eigenen Image statt an latest."
            exit 1
          fi
          echo "Gleicher Digest – ein Paketeintrag trägt latest, 1.6.0 und $TAG."

  desktop:
    name: Windows-Desktop-Client bauen
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten
        working-directory: desktop
        run: npm ci

      - name: MSI bauen
        working-directory: desktop
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-msi
          path: desktop/dist/*.msi
          if-no-files-found: error

  release:
    name: Release veröffentlichen
    needs: [image, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/download-artifact@v4
        with:
          name: desktop-msi
          path: assets

      - name: Branding-Extension dazulegen
        run: cp guacamole-home/extensions/kevin-branding-1.0.0.jar assets/

      - name: Release anlegen bzw. Assets ergänzen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" assets/* --verify-tag --generate-notes \
              --title "$TAG" --repo "$GITHUB_REPOSITORY"
          fi
