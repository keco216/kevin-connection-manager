# Release-Workflow: läuft bei Versions-Tags (v*). Er baut das Guacamole-Image
# NICHT neu, sondern hängt den Versions-Tag an das vorhandene Image – ein
# zweiter Build erzeugt sonst einen zweiten Digest mit identischem Inhalt, und
# die Paketseite zeigt zwei Einträge für denselben Stand. So trägt EIN Image
# die Tags latest, 1.6.0 und vX.Y.Z; der Versions-Tag bleibt der Rollback-Punkt.
#
# Dazu baut er den Windows-Desktop-Client und hängt MSI und Branding-Extension
# als Release-Assets an.
#
# Reihenfolge beim Veröffentlichen: erst nach main pushen und
# "Guacamole-Image mit Branding" abwarten (falls die Extension sich geändert
# hat), dann den Tag setzen – sonst zeigt der Versions-Tag auf den vorherigen
# Stand von latest.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: Versions-Tag an das vorhandene Image hängen
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag setzen (kein Neu-Bau, gleicher Digest)
        run: |
          IMAGE=ghcr.io/keco216/kcm-guacamole
          if ! docker buildx imagetools inspect "$IMAGE:latest" >/dev/null 2>&1; then
            echo "::error::$IMAGE:latest existiert nicht – zuerst build-image.yml laufen lassen."
            exit 1
          fi
          docker buildx imagetools create --tag "$IMAGE:${{ github.ref_name }}" "$IMAGE:latest"
          echo "Digest von ${{ github.ref_name }}:"
          docker buildx imagetools inspect "$IMAGE:${{ github.ref_name }}" --format '{{.Manifest.Digest}}'

  desktop:
    name: Windows-Desktop-Client bauen
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten
        working-directory: desktop
        run: npm ci

      - name: MSI bauen
        working-directory: desktop
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-msi
          path: desktop/dist/*.msi
          if-no-files-found: error

  release:
    name: Release veröffentlichen
    needs: [image, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: desktop-msi
          path: assets

      - name: Branding-Extension dazulegen
        run: cp guacamole-home/extensions/kevin-branding-1.0.0.jar assets/

      - name: Release anlegen bzw. Assets ergänzen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" assets/* --verify-tag --generate-notes \
              --title "$TAG" --repo "$GITHUB_REPOSITORY"
          fi
